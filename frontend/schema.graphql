type EnvironmentParam {
	name: String!
	description: String
	type: String!
}

type Match {
	id: ID!
	txHash: String!
	txName: String!
	source: MatchSource!
	profileName: String!
	protocolName: String!
	"""
	Stored as decimal string to preserve full u64 range.
	"""
	blockSlot: String!
	blockHash: String!
	"""
	ISO 8601 UTC timestamp with literal Z suffix, no fractional seconds.
	"""
	matchedAt: String!
	lifted: String!
}

type MatchConnection {
	"""
	Information to aid in pagination.
	"""
	pageInfo: PageInfo!
	"""
	A list of edges.
	"""
	edges: [MatchEdge!]!
	"""
	A list of nodes.
	"""
	nodes: [Match!]!
}

"""
An edge in a connection.
"""
type MatchEdge {
	"""
	The item at the end of the edge
	"""
	node: Match!
	"""
	A cursor for use in pagination
	"""
	cursor: String!
}

type MatchSource {
	scope: String!
	name: String!
	version: String!
}

"""
Information about pagination in a connection
"""
type PageInfo {
	"""
	When paginating backwards, are there more items?
	"""
	hasPreviousPage: Boolean!
	"""
	When paginating forwards, are there more items?
	"""
	hasNextPage: Boolean!
	"""
	When paginating backwards, the cursor to continue.
	"""
	startCursor: String
	"""
	When paginating forwards, the cursor to continue.
	"""
	endCursor: String
}

type PaginationInfo {
	totalNodes: Int!
	pageSize: Int!
}

type Party {
	name: String!
	description: String
}

type Profile {
	name: String!
	description: String
	environment: String
	parties: [ProfileParty!]!
}

type ProfileParty {
	name: String!
	address: String!
}

type Protocol {
	id: ID!
	name: String!
	scope: String!
	repositoryUrl: String
	publishedDate: Int!
	version: String!
	readme: String
	source: String
	description: String
	transactions: [Tx!]!
	parties: [Party!]!
	profiles: [Profile!]!
	environment: [EnvironmentParam!]!
}

type ProtocolConnection {
	"""
	Information to aid in pagination.
	"""
	pageInfo: PageInfo!
	"""
	A list of edges.
	"""
	edges: [ProtocolEdge!]!
	"""
	A list of nodes.
	"""
	nodes: [Protocol!]!
	metadata: PaginationInfo
}

"""
An edge in a connection.
"""
type ProtocolEdge {
	"""
	The item at the end of the edge
	"""
	node: Protocol!
	"""
	A cursor for use in pagination
	"""
	cursor: String!
}

enum ProtocolSort {
	ALPHABETIC_ASC
	ALPHABETIC_DSC
	UPDATE_TIME
	RELEVANCE
	DOWNLOADS
}

type Query {
	protocols(pageSize: Int, offset: Int, search: String, sortBy: ProtocolSort): ProtocolConnection!
	protocol(scope: String!, name: String!): Protocol
	protocolMatch(scope: String!, name: String!, txHash: String!): Match
	protocolMatches(scope: String!, name: String!, version: String, first: Int, after: String): MatchConnection!
}

type Tx {
	name: String!
	description: String
	parameters: [TxParam!]!
	inputs: [TxInput!]!
	outputs: [TxOutput!]!
	tir: String!
	tirVersion: String!
	svg: String
}

type TxInput {
	name: String!
	party: String
	hasRedeemer: Boolean!
}

type TxOutput {
	party: String
	hasDatum: Boolean!
	optional: Boolean!
}

type TxParam {
	name: String!
	type: String!
	description: String
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
schema {
	query: Query
}
